<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntraHomes | 0% Agency Fee Real Estate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-slate-900 text-white p-4 md:px-12 flex justify-between items-center shadow-lg">
        <div class="text-2xl font-bold tracking-wider">
            <span class="text-emerald-500">Entra</span>Homes
        </div>
        <button class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-full font-semibold transition-all text-sm">
            List Property
        </button>
    </nav>

    <header class="bg-slate-900 text-white text-center py-16 px-4 md:py-24 rounded-b-[40px] shadow-xl">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 leading-tight">
            Bypass the <span class="text-orange-500">20% Agency Fee.</span>
        </h1>
        <p class="text-lg md:text-xl text-slate-300 mb-8 max-w-2xl mx-auto">
            Rent directly from verified landlords in Lagos and Abuja. Premium homes, zero middleman friction.
        </p>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-2xl font-bold text-slate-900">Verified Listings</h2>
            <span class="text-emerald-600 font-semibold text-sm">Updated Today</span>
        </div>

        <div id="property-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="text-center text-slate-500 py-10 font-semibold col-span-full">
                Fetching premium properties from vault...
            </div>
        </div>
    </main>

    <script>
        // 1. Your Exact Vault Keys
        const SUPABASE_URL = 'https://ygcrtfifxfpnkhvolncs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnY3J0ZmlmeGZwbmtodm9sbmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTI1NDIsImV4cCI6MjA5Mzk4ODU0Mn0.oOWb8yb8rD2KlgayUHjd0POG9SO8275TzTrTwQrJpFA';
        
        // 2. Connect to the Vault
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // *** PUT YOUR WHATSAPP NUMBER HERE (Include country code, no + sign) ***
        const FOUNDER_WHATSAPP = '2348000000000'; 

        // 3. Fetch Data and Display It
        async function loadProperties() {
            const { data, error } = await supabase.from('properties').select('*').limit(20);
            
            const grid = document.getElementById('property-grid');
            grid.innerHTML = ''; // Clear loading message

            if (error || !data || data.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-slate-500">No properties found yet. Run your scraper!</div>';
                return;
            }

            // Create a card for every property found
            data.forEach(prop => {
                // The WhatsApp Concierge Message Generator
                const message = encodeURIComponent(`Hello EntraHomes! I am interested in viewing the "${prop.title}" located at ${prop.location} listed for ${prop.price}.`);
                const whatsappLink = `https://wa.me/${FOUNDER_WHATSAPP}?text=${message}`;

                // Set a default image if the scraper missed it
                const imageUrl = prop.image_url && prop.image_url.includes('http') 
                    ? prop.image_url 
                    : 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=800';

                // Build the visual card
                const card = `
                <div class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-2xl transition-all border border-slate-100 flex flex-col">
                    <div class="h-56 bg-slate-200 relative">
                        <img src="${imageUrl}" alt="${prop.title}" class="w-full h-full object-cover"/>
                        <div class="absolute top-4 left-4 bg-emerald-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">
                            ✓ Verified Landlord
                        </div>
                        <div class="absolute bottom-4 right-4 bg-slate-900 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">
                            0% Agency Fee
                        </div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <h3 class="text-xl font-bold text-slate-900 mb-2">${prop.title || 'Premium Property'}</h3>
                        <p class="text-slate-500 text-sm mb-4 flex items-center">📍 ${prop.location || 'Nigeria'}</p>
                        <div class="text-2xl font-extrabold text-emerald-600 mb-6">
                            ${prop.price || 'Contact for price'} <span class="text-sm font-normal text-slate-400">/ rent</span>
                        </div>
                        <a href="${whatsappLink}" target="_blank" class="mt-auto w-full bg-slate-900 hover:bg-slate-800 text-white text-center font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2">
                            📱 Contact EntraHomes
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        // Run the function when the page loads
        loadProperties();
    </script>
</body>
</html>
